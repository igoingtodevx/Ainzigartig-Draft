<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/Assets/favicon.svg" />
    <title>Ainzigartig — KI-Beratung für den Mittelstand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=IBM+Plex+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              base: '#F0EDE3',
              surface: '#E5E2D7',
              accent: '#1B4D3E',
              'accent-mid': '#2D7A5E',
              'accent-h': '#2D7A5E',
              ink: '#1C1917',
              muted: '#6B6861',
              faint: '#B8B2A7',
            },
            fontFamily: {
              editorial: ['"Fraunces"', 'Georgia', 'serif'],
              body: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
            },
            spacing: {
              unit: '8px',
              '2u': '16px',
              '3u': '24px',
              '4u': '32px',
              '6u': '48px',
              '8u': '64px',
              '12u': '96px',
              '16u': '128px',
            },
            borderRadius: {
              DEFAULT: '2px',
            },
            keyframes: {
              reveal: {
                '0%': { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'underline-in': {
                '0%': { backgroundSize: '0% 1px' },
                '100%': { backgroundSize: '100% 1px' },
              },
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              },
            },
            animation: {
              reveal: 'reveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'underline-in': 'underline-in 0.4s cubic-bezier(0.33, 1, 0.68, 1) forwards',
              blink: 'blink 1s step-end infinite',
            },
          },
        },
      };
    </script>
    <style>
      html {
        background-color: #f0ede3;
        color: #1c1917;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        background-color: #f0ede3;
        color: #1c1917;
      }
      ::selection {
        background-color: #1b4d3e;
        color: #f0ede3;
      }
      a[href='#'] {
        cursor: pointer;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@^19.2.4/",
          "react": "https://esm.sh/react@^19.2.4",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
